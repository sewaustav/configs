################
### MONITORS ###
################

monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################


$terminal = kitty
$fileManager = nemo
$menu = wofi --show drun



#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = flameshot
exec-once = hyprpaper
exec-once = hyprctl dispatch workspace 1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# exec-once = nwg-dock-hyprland -d -p bottom -hd 0 -i 48
exec-once = hypridle &
exec-once = swaync &
exec-once = kdeconnect-cli
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = xdg-desktop-portal-hyprland
exec-once = xdg-desktop-portal
exec-once = ~/.config/hypr/scripts/touchpad.py
exec-once = hyprctl plugin load ~/hyprland-plugins/hyprexpo/hyprexpo.so
# exec-once = ~/.config/hypr/scripts/next_workspace.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Breeze_Dark
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_MENU_PREFIX,arch-


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }


permission = /usr/bin/flameshot, screencopy, allow
permission = /usr/bin/grim, screencopy, allow


#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 2

    border_size = 2

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, # please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}



dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############
input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    scroll_method = edge

    touchpad {
        natural_scroll = false

    }
}

gesture = 3, horizontal, workspace

hyprexpo-gesture = 3, up, expo

hyprexpo-gesture = 3, down, expo

device {
    name = "sigmachip-usb-mouse"
    sensitivity = -1

}
###################
##### PLUGINS #####
###################


plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = first 1
        # workspace_method = center current 

        enable_gesture = true
        gesture_fingers = 3
        gesture_distance = 300
        gesture_positive = true
    }
}


###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, W, exec, ~/.config/hypr/scripts/toggle_touchpad.py
bind = $mainMod, F, fullscreen
bind = $mainMod, G, exec, ~/.config/hypr/scripts/float.sh
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, Z, exec, wlogout -b 5

# bind = $mainMod, TAB, exec, sh ~/.config/hypr/scripts/windowlist.sh --style ~/.config/wofi/styleswitcher.css
# bind = $mainMod, TAB, cyclenext
bind = $mainMod SHIFT, TAB, cyclenext, prev, all, currentworkspace

bind = SUPER, TAB, hyprexpo:expo, toggle

# apps
bindl = $mainMod, R, exec, $menu
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, T, exec, ~/.config/hypr/scripts/kitty.sh
bind = ALT, W, exec, ~/.config/hypr/scripts/wallpaper.py
bind = ALT, E, exec, $fileManager
bind = ALT, B, exec, chromium
bind = ALT, C, exec, code
bind = ALT, Z, exec, zeditor
bind = ALT, T, exec, Telegram
# bind = ALT, G, exec, ~/.local/bin/goland-launcher
bind = ALT CTRL, Delete, exec, xfce4-taskmanager
bind = ALT, Q, exec, qalculate-gtk

# window managment
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d

binde = ALT SHIFT, left,  resizeactive, -10 0
binde = ALT SHIFT, right, resizeactive, 10  0
binde = ALT SHIFT, up,    resizeactive,  0 -10
binde = ALT SHIFT, down,  resizeactive,  0  10

# clipboard
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, exec, cliphist wipe

bindel = , Print, exec, XDG_CURRENT_DESKTOP=sway flameshot gui

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod ALT, right, movetoworkspace, r+1
bind = $mainMod ALT, left, movetoworkspace, r-1

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = SUPER, h, movetoworkspace, special:hidden
bind = ALT, TAB, togglespecialworkspace, hidden

bind = $mainMod, d, togglespecialworkspace, duty
bind = $mainMod SHIFT, d, movetoworkspace, special:duty

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindel = ,ALT_R, workspace, r-1
bindel = ,Control_R, workspace, r+1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5 && notify-send "🔊 $(pamixer --get-volume)%" -t 1000 -h string:x-canonical-private-synchronous:volume
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5 && notify-send "🔈 $(pamixer --get-volume)%" -t 1000 -h string:x-canonical-private-synchronous:volume
bindel = , XF86AudioMute, exec, pamixer -t && notify-send "🔇 Muted" -t 1000

# Яркость
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ && notify-send "☀️ $(brightnessctl -m | cut -d, -f4 | tr -d '%')%" -t 1000
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send "☀️ $(brightnessctl -m | cut -d, -f4 | tr -d '%')%" -t 1000

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

workspace = 1, monitor:eDP-1, default:true, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true, chromium
workspace = 4, monitor:eDP-1, persistent:true
workspace = 5, monitor:eDP-1, persistent:true
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = special:hidden
workspace = special:duty

windowrule = workspace special:duty, match:class ^(qalculate-gtk)
windowrule = workspace 2, match:class code-oss
windowrule = workspace 2, match:class ^(dev\.zed\.Zed)
# windowrule = workspace 2, match:class Antigravity
windowrule = workspace 3, match:class chromium
windowrule = workspace 4, match:class nemo
windowrule = workspace 7, match:class firefox
windowrule = workspace 9, match:class ONLYOFFICE

windowrule {
    name = wallpaper
    match:title = Hyprland Wallpaper Selector
    float = on
    center = on
    size = 1020 664
}

windowrule {
    name = file-dialogs
    match:title = ^(Open File|Save File)$
    float = on
    center = on
    size = 1000 700
}

# windowrule {
#     name = google-auth
#     match:title = ^(Вход – Google Аккаунты - Chromium)
#     float = on
#     center = on
#     size = 1000 700
# }

windowrule {
    name = flameshot
    match:class = ^(flameshot)$
    float = on
    pin = on
    move = 0 0
}

windowrule {
    name = telegram
    match:class = ^(org\.telegram\.desktop)$
    float = on
    center = on
    size = 800 600
}

windowrule {
    name = eog
    match:class = ^(org\.gnome\.eog)$
    float = on
    center = on
    size = 800 600
}

windowrule {
    name = xed
    match:class = ^(xed)$
    float = on
    size = 800 600
}

windowrule {
    name = xfce-taskmanager
    match:class = ^(xfce4-taskmanager)$
    float = on
    size = 800 600
}

windowrule {
    name = chrome-extension
    match:class = ^(chrome-jhfafgojnlneaffmkkjbcpnadneeocbk-Default)$
    float = on
    size = 530 700
}

windowrule {
    name = evince
    match:class = ^(org\.gnome\.Evince)$
    workspace = 5
}

windowrule {
    name = blueman
    match:class = ^(blueman-manager)$
    float = on
    center = on
    size = 600 400
}

windowrule {
    name = yad
    match:class = ^(yad)$
    float = on
    size = 400 250
    move = 35% 10%
}

windowrule {
    name = xdg-portal
    match:class = ^(xdg-desktop-portal-gtk)$
    float = on
    size = 800 600
}

windowrule {
    name = timer
    match:class = ^(com\.github\.vikdevelop\.timer)$
    workspace = special:duty
    float = on
    center = on
    size = 600 400
}

windowrule {
    name = qalculate
    match:class = ^(qalculate-gtk)$
    workspace = special:duty
    float = on
    center = on
    size = 470 600
}


# opacity
windowrule = opacity 0.95 0.95, match:class kitty
